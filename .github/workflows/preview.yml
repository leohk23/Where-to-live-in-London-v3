name: Deploy Preview

# Publishes any non-main branch to the gh-pages /preview subpath so changes can be
# reviewed at https://leohk23.github.io/Where-to-live-in-London-v3/preview/ before
# they are merged to main and go live at the site root.
on:
  push:
    branches-ignore:
      - main
      - gh-pages

permissions:
  contents: write

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm ci
      - name: Build (preview base path)
        run: npm run build
        env:
          DEPLOY_BASE: /Where-to-live-in-London-v3/preview/
      - name: Publish preview to gh-pages /preview
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: preview
          # Keep the live root deploy intact; only the /preview subfolder is replaced.
          keep_files: true
